<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrar Locação - Mãe João Vitor</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='aluguel.css') }}">
    <!-- Importação de ícones -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
  <ul id="header">
        <li><a href="{{ url_for('home') }}">Home</a></li>
        <li class="dropdown">
            <a href="">Cadastro </a>
            <ul class="submenu">
                <li><a href="{{ url_for('clientes') }}">clientes</a></li>
                <li><a href="{{ url_for('produtos') }}">produtos</a></li>
            </ul>
        </li>
        <li class="dropdown">
            <a href="">Produtos </a>
            <ul class="submenu">
                <li><a href="{{ url_for('vendas') }}">Venda</a></li>
                <li><a href="{{ url_for('aluguel') }}">Aluguel</a></li>
            </ul>
        </li>
        <li><a href="">dashboard</a></li>
    </ul>
        <!-- 1. Card de Nova Locação -->
        <div class="card-locacao">
            <div class="card-header-green">
                <i class="fas fa-holly-berry"></i> <!-- Ícone festivo simulando confete -->
                <h1>Registrar Locação/Aluguel</h1>
            </div>

            <form class="form-locacao">
                <!-- Informações do Contrato -->
                <div class="grid-geral">
                    <div class="campo">
                        <label>Cliente</label>
                        <select name="cliente" required>
                            <option value="">Selecione um cliente...</option>
                            <!-- Clientes virão do banco futuramente -->
                        </select>
                    </div>
                    <div class="campo">
                        <label>Forma de Pagamento</label>
                        <select name="pagamento">
                            <option value="dinheiro">Dinheiro</option>
                            <option value="cartao">Cartão</option>
                            <option value="pix">PIX</option>
                        </select>
                    </div>
                    <div class="campo">
                        <label>Data de Início</label>
                        <input type="date" name="data_inicio" required>
                    </div>
                    <div class="campo">
                        <label>Quantidade de Dias</label>
                        <input type="number" name="dias" min="1" value="1">
                    </div>
                    <div class="campo">
                        <label>Valor do Frete (R$)</label>
                        <input type="number" step="0.01" name="frete" placeholder="0,00">
                    </div>
                </div>

                <!-- Itens em Locação -->
                <div class="secao-itens">
                    <h3><i class="fas fa-list-ul"></i> Itens em Locação</h3>
                    <div class="item-row">
                        <div class="campo item-produto">
                            <label>Produto</label>
                            <select name="produto[]">
                                <option value="">Selecione o produto...</option>
                            </select>
                        </div>
                        <div class="campo item-qtd">
                            <label>Qtd</label>
                            <input type="number" value="1" min="1">
                        </div>
                        <div class="campo item-valor">
                            <label>Valor Diário (R$)</label>
                            <input type="text" value="0,00" readonly>
                        </div>
                        <div class="campo item-subtotal">
                            <label>Subtotal</label>
                            <input type="text" value="0,00" readonly>
                        </div>
                        <div class="item-acao">
                            <button type="button" class="btn-remove" title="Remover Item">X</button>
                        </div>
                    </div>
                    <button type="button" class="btn-add-item">+ Adicionar Item</button>
                </div>

                <!-- Resumo Financeiro -->
                <div class="resumo-financeiro">
                    <h3>Resumo Financeiro</h3>
                    <div class="total-geral">Total Geral: R$ 0,00</div>
                </div>

                <div class="form-footer">
                    <button type="submit" class="btn-finalizar">Registrar Locação</button>
                </div>
            </form>
        </div>

        <!-- 2. Visualização de Locações -->
        <div class="container-lista-locacao">
            <div class="empty-state-locacao">
                <i class="fas fa-folder-open"></i>
                <p>Nenhuma locação registrada ainda</p>
            </div>
        </div>
    </div>

</body>
</html>
