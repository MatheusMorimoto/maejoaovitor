<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Login - Josi Decorando</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f1f3f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); width: 350px; border-top: 6px solid #f59f00; }
        h2 { color: #333; text-align: center; margin-bottom: 30px; }
        .campo { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; font-size: 14px; }
        input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #007bff; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .erro { color: #dc3545; text-align: center; margin-bottom: 20px; font-size: 14px; }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>Acesso ao Sistema</h2>
        {% if erro %}
            <div class="erro">{{ erro }}</div>
        {% endif %}
        <form action="/login" method="POST">
            <div class="campo">
                <label>E-mail</label>
                <input type="email" name="usuario" placeholder="seu@email.com" required>
            </div>
            <div class="campo">
                <label>Senha</label>
                <input type="password" name="senha" placeholder="••••••••" required>
            </div>
            <button type="submit">Entrar no Sistema</button>
        </form>
    </div>
</body>
</html>
