<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='vendas.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <title>Registrar Venda</title>
</head>
<body>
    <!-- Header padrão -->
    <ul id="header">
        <li><a href="{{ url_for('home') }}">Home</a></li>
        <li class="dropdown">
            <a href="">Cadastro </a>
            <ul class="submenu">
                <li><a href="{{ url_for('clientes') }}">clientes</a></li>
                <li><a href="{{ url_for('produtos') }}">produtos</a></li>
            </ul>
        </li>
        <li class="dropdown">
            <a href="">Produtos </a>
            <ul class="submenu">
                <li><a href="{{ url_for('vendas') }}">Venda</a></li>
                <li><a href="{{ url_for('aluguel') }}">Aluguel</a></li>
            </ul>
        </li>
        <li><a href="">dashboard</a></li>
    </ul>

    <div class="main-container">
        
        <!-- 1. Interface de Nova Venda -->
        <div class="card-venda">
            <div class="card-header-red">
                <i class="fa-solid fa-sack-dollar"></i>
                <h1>Registrar Venda</h1>
            </div>
            
            <form action="" method="POST" class="form-venda">
                <!-- Informações Gerais -->
                <div class="grid-geral">
                    <div class="campo">
                        <label for="cliente">Cliente</label>
                        <select id="cliente" name="cliente_id" required>
                            <option value="">Selecione um cliente...</option>
                            {% for cliente in clientes %}
                            <option value="{{ cliente.id }}">{{ cliente.nome }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="campo">
                        <label for="pagamento">Forma de Pagamento</label>
                        <select id="pagamento" name="forma_pagamento">
                            <option value="Dinheiro">Dinheiro</option>
                            <option value="Credito">Cartão de Crédito</option>
                            <option value="Debito">Cartão de Débito</option>
                            <option value="Pix">Pix</option>
                        </select>
                    </div>

                    <div class="campo">
                        <label for="frete">Valor do Frete (R$)</label>
                        <input type="number" step="0.01" id="frete" name="valor_frete" placeholder="0.00">
                    </div>
                </div>

                <!-- Itens da Venda -->
                <div class="secao-itens">
                    <h3><i class="fa-solid fa-box-open"></i> Itens da Venda</h3>
                    
                    <div id="lista-itens">
                        <!-- Linha de Item Modelo -->
                        <div class="item-row">
                            <div class="campo item-produto">
                                <label>Produto</label>
                                <select name="produto_id[]" onchange="atualizarPreco(this)">
                                    <option value="" data-preco="0">Selecione...</option>
                                    {% for produto in produtos %}
                                    <option value="{{ produto.id }}" data-preco="{{ produto.preco_venda }}">
                                        {{ produto.nome }}
                                    </option>
                                    {% endfor %}
                                </select>
                            </div>
                            <div class="campo item-qtd">
                                <label>Qtd</label>
                                <input type="number" name="quantidade[]" value="1" min="1" onchange="calcularSubtotal(this)">
                            </div>
                            <div class="campo item-valor">
                                <label>Valor Un.</label>
                                <input type="text" class="preco-unitario" readonly value="R$ 0.00">
                            </div>
                            <div class="campo item-subtotal">
                                <label>Subtotal</label>
                                <input type="text" class="subtotal" readonly value="R$ 0.00">
                            </div>
                            <div class="campo item-acao">
                                <label>&nbsp;</label>
                                <button type="button" class="btn-remove" onclick="removerItem(this)"><i class="fa-solid fa-times"></i></button>
                            </div>
                        </div>
                    </div>

                    <button type="button" class="btn-add-item" onclick="adicionarItem()">
                        <i class="fa-solid fa-plus"></i> Adicionar Item
                    </button>
                </div>

                <!-- Ação Final -->
                <div class="form-footer">
                    <button type="submit" class="btn-finalizar">
                        <i class="fa-solid fa-check"></i> Registrar Venda
                    </button>
                </div>
            </form>
        </div>

        <!-- 2. Histórico de Vendas Registradas -->
        <div class="container-historico">
            <div class="header-tabela">
                <h2>Histórico de Vendas</h2>
            </div>
            <table id="tabela-vendas">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Cliente</th>
                        <th>Data</th>
                        <th>Total</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Exemplo de linha vazia ou preenchida pelo backend futuramente -->
                    <tr>
                        <td colspan="5" style="text-align:center; color: #777;">Nenhuma venda registrada hoje.</td>
                    </tr>
                </tbody>
            </table>
        </div>

    </div>


</body>
</html>
